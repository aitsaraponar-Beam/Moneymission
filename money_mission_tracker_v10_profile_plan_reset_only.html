<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Money Mission Tracker v6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07050c;--bg2:#13081d;--panel:#120d1d;--card:rgba(255,255,255,.07);--card2:rgba(255,255,255,.045);
  --text:#fff8ff;--muted:#b9abc9;--line:rgba(255,255,255,.11);
  --purple:#9d4edd;--pink:#ff4fa3;--yellow:#ffd24d;--green:#4ade80;--red:#fb7185;
  --shadow:0 20px 50px rgba(0,0,0,.42);--r:24px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;min-height:100vh;font-family:"Noto Sans Thai",system-ui,sans-serif;color:var(--text);
  background:radial-gradient(circle at 8% 8%,rgba(255,79,163,.17),transparent 24%),
             radial-gradient(circle at 88% 4%,rgba(255,210,77,.13),transparent 22%),
             radial-gradient(circle at 78% 44%,rgba(157,78,221,.18),transparent 25%),
             linear-gradient(135deg,var(--bg),var(--bg2) 72%,#050408);
}
.svgicon{width:1.15em;height:1.15em;display:inline-block;vertical-align:-.18em;stroke:currentColor;fill:none}
.app{max-width:1240px;margin:0 auto;padding:24px 16px 48px}
.shell{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
.sidebar,.topbar,.card,.modal-card{
  background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.038));
  border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(14px)
}
.sidebar{position:sticky;top:16px;border-radius:28px;padding:18px;overflow:hidden}
.brand-badge{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,var(--purple),var(--pink),var(--yellow));color:#2b1200;margin-bottom:12px}
.brand-badge .svgicon{width:28px;height:28px}
.brand h1{margin:0;font-size:23px;line-height:1.12;letter-spacing:-.035em}
.nav{display:grid;gap:8px;margin-top:18px}
.nav button,button{
  border:0;cursor:pointer;font-family:inherit;font-weight:900;border-radius:999px;padding:10px 14px;color:#fff;
  background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 10px 20px rgba(255,79,163,.18);
  display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:.16s ease;font-size:13px
}
.nav button{width:100%;justify-content:flex-start;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);box-shadow:none;border-radius:16px}
.nav button.active{background:linear-gradient(135deg,rgba(157,78,221,.52),rgba(255,79,163,.34));border-color:rgba(255,210,77,.24)}
button:hover{transform:translateY(-1px);filter:brightness(1.08)}
button.secondary{background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.13);box-shadow:none}
button.warning{background:linear-gradient(135deg,#f59e0b,var(--yellow));color:#2c1600}
button.danger{background:linear-gradient(135deg,#e11d48,var(--pink))}
button.small{padding:8px 10px;font-size:12px}
.quick-status{margin-top:16px;padding:14px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09)}
.quick-status .label{color:var(--muted);font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase}
.quick-status .value{margin-top:5px;font-size:25px;font-weight:900;letter-spacing:-.035em}
.quick-status .note{margin-top:4px;color:#d7c7e5;font-size:12px}
.topbar{border-radius:28px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.topbar h2{margin:0;font-size:clamp(28px,3.5vw,42px);line-height:1.08;letter-spacing:-.04em}
.topbar .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.1);font-size:12px;font-weight:900;color:#fff0a8}
.tab-page{display:none}.tab-page.active{display:block}
.grid{display:grid;gap:16px}.kpi-grid{grid-template-columns:repeat(4,1fr)}.two-col{grid-template-columns:1.05fr .95fr}.month-cards{grid-template-columns:repeat(4,1fr)}
.card{border-radius:var(--r);padding:20px;overflow:hidden}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.section-title h3{margin:0;font-size:21px;line-height:1.2;letter-spacing:-.02em}
.kpi{min-height:144px;display:flex;flex-direction:column;justify-content:space-between}
.kpi-top{display:flex;justify-content:space-between;gap:10px}.kpi-label{color:#d8c9e8;font-size:12px;font-weight:900;letter-spacing:.03em;text-transform:uppercase}
.kpi-value{margin-top:8px;font-size:32px;line-height:1;font-weight:900;letter-spacing:-.04em}.kpi-note{margin-top:8px;color:var(--muted);font-size:12px}
.icon{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 12px 22px rgba(0,0,0,.22)}
.icon .svgicon{width:23px;height:23px}.i-purple{background:linear-gradient(135deg,var(--purple),var(--pink))}.i-pink{background:linear-gradient(135deg,var(--pink),#fb7185)}.i-yellow{background:linear-gradient(135deg,var(--yellow),#fb923c);color:#321700}.i-green{background:linear-gradient(135deg,var(--green),#22c55e);color:#04140a}
.progress-shell,.month-card,.insight,.check-card,.mini{padding:15px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09)}
.progress-head{display:flex;justify-content:space-between;gap:12px;font-weight:900;font-size:14px;margin-bottom:11px}
.track{height:16px;border-radius:999px;background:rgba(255,255,255,.085);overflow:hidden;border:1px solid rgba(255,255,255,.09)}
.fill{height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--purple),var(--pink),var(--yellow));box-shadow:0 0 22px rgba(255,79,163,.3);transition:.25s}
.progress-note{margin-top:10px;color:#d5c6e4;font-size:12px;line-height:1.55}
.insight-list{display:grid;gap:9px}.insight{font-size:13px;line-height:1.55;font-weight:700}.insight.good{border-color:rgba(74,222,128,.24);background:rgba(74,222,128,.08)}.insight.warn{border-color:rgba(255,210,77,.28);background:rgba(255,210,77,.08)}.insight.bad{border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}
.table-wrap{overflow:auto;border-radius:20px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.02)}
table{width:100%;min-width:740px;border-collapse:separate;border-spacing:0}th,td{padding:12px 13px;border-bottom:1px solid rgba(255,255,255,.075);text-align:left;vertical-align:middle;font-size:13px}th{position:sticky;top:0;z-index:2;background:rgba(22,13,35,.96);color:#fff0a8;font-weight:900;white-space:nowrap}tr:last-child td{border-bottom:0}td.num{text-align:right;font-weight:900;white-space:nowrap}.month-cell{font-weight:900;color:#ffd6ea;white-space:nowrap}
.badge{display:inline-flex;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900;white-space:nowrap;border:1px solid transparent}.badge.done{background:rgba(74,222,128,.14);color:#b7f7cd;border-color:rgba(74,222,128,.18)}.badge.progress{background:rgba(255,210,77,.15);color:#fff0a8;border-color:rgba(255,210,77,.2)}.badge.risk{background:rgba(251,113,133,.15);color:#fecdd3;border-color:rgba(251,113,133,.2)}.badge.neutral{background:rgba(255,255,255,.08);color:#e9ddf7;border-color:rgba(255,255,255,.1)}
input,select{width:100%;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.07);color:#fff;border-radius:14px;padding:10px 11px;outline:none;font-family:inherit;font-size:14px}select option{background:#171126;color:white}input:focus,select:focus{border-color:rgba(255,210,77,.5);box-shadow:0 0 0 4px rgba(255,210,77,.1)}
.input-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{display:grid;gap:7px}.field label,.field-label{color:#e7d9f6;font-size:12px;font-weight:900;letter-spacing:.02em}.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.check-card{display:flex;gap:12px;align-items:flex-start;min-height:82px}.check-card input{width:21px;height:21px;accent-color:var(--pink);margin-top:2px;flex:0 0 auto}.check-card h4{margin:0 0 4px;font-size:15px}.check-card p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}
.month-card h4{margin:0 0 11px;font-size:17px;color:#ffd6ea}.month-stat{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.065);font-size:13px}.month-stat:last-child{border-bottom:0}.month-stat span:first-child{color:var(--muted)}.month-stat span:last-child{font-weight:900;text-align:right}
.progress-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
.debt-summary{display:grid;gap:12px}
.debt-stat{padding:18px;border-radius:22px;background:linear-gradient(135deg,rgba(157,78,221,.18),rgba(255,79,163,.10));border:1px solid rgba(255,255,255,.1)}
.debt-stat span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}.debt-stat b{display:block;margin-top:7px;font-size:30px;letter-spacing:-.04em}
.timeline{display:grid;gap:10px}
.timeline-item{display:grid;grid-template-columns:72px minmax(0,1fr) 92px;gap:12px;align-items:center;padding:13px;border-radius:18px;background:rgba(255,255,255,.042);border:1px solid rgba(255,255,255,.085)}
.timeline-month{font-weight:900;color:#ffd6ea}.timeline-bar{height:12px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.09)}.timeline-fill{height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--pink),var(--yellow));border-radius:inherit}.timeline-value{text-align:right;font-weight:900;color:#fff0a8;font-size:13px}.timeline-sub{margin-top:5px;color:var(--muted);font-size:11px}
.actions,.select-wrap{display:flex;gap:9px;flex-wrap:wrap;align-items:center}.check-toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.64);backdrop-filter:blur(10px)}.modal.show{display:flex}.modal-card{width:min(640px,100%);border-radius:28px;overflow:hidden}.modal-head{padding:20px;display:flex;justify-content:space-between;gap:14px;align-items:flex-start;background:linear-gradient(135deg,rgba(157,78,221,.3),rgba(255,79,163,.18),rgba(255,210,77,.1));border-bottom:1px solid rgba(255,255,255,.1)}.modal-head h3{margin:0;font-size:23px;letter-spacing:-.03em}.modal-body{padding:20px}.modal-actions{display:flex;justify-content:flex-end;gap:9px;padding:0 20px 20px;flex-wrap:wrap}.close-btn{width:36px;height:36px;border-radius:14px;padding:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);box-shadow:none;flex:0 0 auto}
.achievement-preview{position:relative;overflow:hidden;border-radius:26px;padding:24px;background:radial-gradient(circle at 18% 16%,rgba(255,210,77,.32),transparent 28%),radial-gradient(circle at 82% 22%,rgba(255,79,163,.36),transparent 30%),linear-gradient(135deg,rgba(157,78,221,.34),rgba(255,79,163,.2),rgba(255,210,77,.12)),rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);min-height:350px}.achievement-icon{width:60px;height:60px;border-radius:21px;display:grid;place-items:center;background:linear-gradient(135deg,var(--yellow),var(--pink));color:#2d1200;box-shadow:0 18px 34px rgba(255,79,163,.24)}.achievement-icon .svgicon{width:32px;height:32px}.achievement-title{margin:0;font-size:32px;line-height:1.05;letter-spacing:-.04em}.achievement-subtitle{margin:13px 0 2px;color:#fff0a8;font-size:17px;font-weight:900}.achievement-message{margin:13px 0;color:#efe4fb;font-size:14px;line-height:1.65}.achievement-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.achievement-metric{padding:13px;border-radius:17px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.12)}.achievement-metric span{display:block;color:#cdbfe0;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}.achievement-metric b{display:block;font-size:21px;letter-spacing:-.03em}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;background:rgba(18,12,28,.94);color:white;border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow);border-radius:999px;padding:11px 15px;z-index:80;transition:.22s;font-size:13px;font-weight:900;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.accent-yellow{color:#fff0a8}.accent-pink{color:#ffb1d7}.accent-green{color:#bbf7d0}
@media(max-width:1120px){.shell{grid-template-columns:1fr}.sidebar{position:relative;top:auto}.nav{grid-template-columns:repeat(3,1fr)}.kpi-grid,.two-col,.month-cards,.progress-layout{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.app{padding:16px 10px 40px}.sidebar,.topbar,.card{border-radius:22px}.nav,.kpi-grid,.two-col,.month-cards,.check-grid,.input-grid,.progress-layout{grid-template-columns:1fr}.section-title{align-items:flex-start;flex-direction:column}.timeline-item{grid-template-columns:1fr;gap:8px}.timeline-value{text-align:left}.actions button,.modal-actions button{width:100%}}
@media print{body{background:white;color:black}.app{max-width:none;padding:0}.sidebar,.actions,.modal,.toast{display:none!important}.shell{display:block}.card,.topbar{box-shadow:none;backdrop-filter:none}.tab-page{display:block!important;page-break-before:always}}
</style>
</head>
<body>

<symbol id="ico-dashboard" viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="4" width="7" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="4" y="13" width="7" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="13" width="7" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
<symbol id="ico-plan" viewBox="0 0 24 24"><path d="M7 3h10a2 2 0 0 1 2 2v16H5V5a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>

<symbol id="ico-chart" viewBox="0 0 24 24"><path d="M4 19V5M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="m7 15 4-4 3 3 5-7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
<symbol id="ico-setting" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.1 2.1 0 0 1-2.98 2.98l-.04-.04A1.8 1.8 0 0 0 14.8 19.6a1.8 1.8 0 0 0-1.1 1.66V21a2.1 2.1 0 0 1-4.2 0v-.06A1.8 1.8 0 0 0 8.4 19.3a1.8 1.8 0 0 0-1.98.36l-.04.04a2.1 2.1 0 0 1-2.98-2.98l.04-.04A1.8 1.8 0 0 0 3.8 14.7 1.8 1.8 0 0 0 2.1 13H2a2.1 2.1 0 0 1 0-4.2h.08A1.8 1.8 0 0 0 3.8 7.6a1.8 1.8 0 0 0-.36-1.98l-.04-.04A2.1 2.1 0 1 1 6.38 2.6l.04.04A1.8 1.8 0 0 0 8.4 3a1.8 1.8 0 0 0 1.1-1.66V1.2a2.1 2.1 0 0 1 4.2 0v.14A1.8 1.8 0 0 0 14.8 3a1.8 1.8 0 0 0 1.98-.36l.04-.04a2.1 2.1 0 1 1 2.98 2.98l-.04.04A1.8 1.8 0 0 0 19.4 7.6 1.8 1.8 0 0 0 21 8.8h.1a2.1 2.1 0 0 1 0 4.2H21a1.8 1.8 0 0 0-1.6 2Z" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round"/></symbol>
<symbol id="ico-wallet" viewBox="0 0 24 24"><path d="M4 7h15a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a3 3 0 0 1-3-3V7.5A3.5 3.5 0 0 1 5.5 4H18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M16 13h5" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="13" r="1" fill="currentColor"/></symbol>

<symbol id="ico-save" viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5V3Z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 3v7h8V3M8 21v-7h8v7" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
<symbol id="ico-download" viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 20h16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>

<main class="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge"><svg class="svgicon"><use href="#ico-card"/></svg></div>
        <h1><span id="brandAppName">Money Mission Tracker</span><br><span class="accent-yellow" id="brandOwnerName">Beam</span></h1>
      </div>
      <nav class="nav">
        <button class="active" data-tab="dashboard" onclick="switchTab('dashboard')"><svg class="svgicon"><use href="#ico-dashboard"/></svg><span data-t="navDashboard"></span></button>
        <button data-tab="monthly" onclick="switchTab('monthly')"><svg class="svgicon"><use href="#ico-plan"/></svg><span data-t="navMonthly"></span></button>
        <button data-tab="checklist" onclick="switchTab('checklist')"><svg class="svgicon"><use href="#ico-check"/></svg><span data-t="navChecklist"></span></button>
        <button data-tab="progress" onclick="switchTab('progress')"><svg class="svgicon"><use href="#ico-chart"/></svg><span data-t="navProgress"></span></button>
        <button data-tab="setting" onclick="switchTab('setting')"><svg class="svgicon"><use href="#ico-setting"/></svg><span data-t="navSetting"></span></button>
      </nav>
      <div class="quick-status"><div class="label" data-t="quickStatus"></div><div class="value" id="sideProgress">0%</div><div class="note" id="sideNote"></div></div>
    </aside>

    <section class="content">
      <header class="topbar">
        <h2 id="pageTitle"></h2>
        <div class="meta">
          <span class="pill" id="topDebtPill"></span>

function statusObj(m){const c=checklistCount(m),p=personalUse(m); if(p<0||!m.checklist.noNewDebt)return{text:t("risk"),cls:"risk"}; if(c===5)return{text:t("completed"),cls:"done"}; if(c>0)return{text:t("inProgress"),cls:"progress"}; return{text:t("notStarted"),cls:"neutral"}}
function selectedIndex(){const v=Number(document.getElementById("selectedMonth")?.value||1);return Math.max(0,data.months.findIndex(m=>m.month===v))}
function renderLang(){document.documentElement.lang=lang()==="en"?"en":"th";document.querySelectorAll("[data-t]").forEach(el=>el.textContent=t(el.dataset.t));document.getElementById("brandAppName").textContent=data.appName;document.getElementById("brandOwnerName").textContent=data.ownerName;document.title=`${data.appName} | ${data.ownerName}`;const page={dashboard:t("dashboardTitle"),monthly:t("monthlyTitle"),checklist:t("checklistPageTitle"),progress:t("progressTitle"),setting:t("settingTitle")};document.getElementById("pageTitle").textContent=page[activeTab];document.getElementById("achModalHead").textContent=t("achModalHead");document.getElementById("achLblPaid").textContent=t("paid");document.getElementById("achLblLeft").textContent=t("debtLeft");document.getElementById("achLblSaving").textContent=t("saving");document.getElementById("achFooter").textContent=t("achFooter")}
function switchTab(tab){activeTab=tab;document.querySelectorAll(".tab-page").forEach(e=>e.classList.remove("active"));document.getElementById(`tab-${tab}`).classList.add("active");document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));render()}
function render(){renderLang();renderSettings();renderKpis();renderInsights();renderDashboardCards();renderMonthSelector();renderMonthRows();renderChecklist();renderTimeline();renderProgressRows()}
function renderSettings(){["appName","ownerName","languageMode","startingDebt","targetMonths"].forEach(id=>{const el=document.getElementById(id); if(el)el.value=data[id]});const mp=document.getElementById("minPayDisplay");if(mp)mp.value=fmt(data.targetMonths>0?data.startingDebt/data.targetMonths:0)}
function renderKpis(){
const paid=totalPaid(),forecast=plannedPaid(),remain=Math.max(0,data.startingDebt-paid),prog=data.startingDebt?Math.min(100,paid/data.startingDebt*100):0,forecastProg=data.startingDebt?Math.min(100,forecast/data.startingDebt*100):0,risk=data.months.filter(m=>personalUse(m)<0||!m.checklist.noNewDebt).length,complete=data.months.filter(m=>checklistCount(m)===5).length;
document.getElementById("kpiRemainingDebt").textContent=fmt(remain);
document.getElementById("kpiProgress").textContent=pct(prog);
document.getElementById("kpiSaving").textContent=fmt(actualSaving());
document.getElementById("sideProgress").textContent=pct(prog);
document.getElementById("sideNote").textContent=`${fmt(paid)} actual / ${fmt(data.startingDebt)}`;
document.getElementById("topDebtPill").textContent=`${t("debtLeft")}: ${fmt(remain)}`;
document.getElementById("topLangPill").textContent=`Language: ${lang().toUpperCase()}`;

if(remain<=0){st=t("debtFree");note=lang()==="en"?"Completed":"ปิดหนี้แล้ว"}
else if(risk>0){st=t("needCheck");note=lang()==="en"?`${risk} month(s) need review`:`${risk} เดือนควรตรวจสอบ`}
else if(!complete){st=t("startNow");note=lang()==="en"?"Start updating checklist":"เริ่มอัปเดต checklist"}
document.getElementById("kpiStatus").textContent=st;
document.getElementById("kpiStatusNote").textContent=note;
document.getElementById("overallProgressText").textContent=`${fmt(paid)} / ${fmt(data.startingDebt)}`;
document.getElementById("overallProgressFill").style.width=`${prog}%`;
document.getElementById("overallProgressNote").innerHTML=remain<=0?`<span class="accent-green"><b>Congrats!</b></span> ${lang()==="en"?"Debt-free based on actual checked payments.":"ปิดหนี้จากยอดจ่ายจริงที่ติ๊กแล้ว"}`:`${t("debtLeft")}: <b>${fmt(remain)}</b> · ${t("planForecast")}: <b>${fmt(forecast)}</b> (${pct(forecastProg)})`;
document.getElementById("progressPaid").textContent=fmt(paid);
document.getElementById("progressForecast").textContent=fmt(forecast);
document.getElementById("progressLeft").textContent=fmt(remain);
document.getElementById("progressPct").textContent=pct(prog)
}
function insights(){
const paid=totalPaid(),forecast=plannedPaid(),remain=Math.max(0,data.startingDebt-paid),min=data.targetMonths?data.startingDebt/data.targetMonths:0,riskPersonal=data.months.filter(m=>personalUse(m)<0).length,low=data.months.filter(m=>m.debtPay<min&&remain>0).length,noNew=data.months.filter(m=>!m.checklist.noNewDebt).length,extra=data.months.filter(m=>m.debtPay>8500).length;
let a=[];
a.push(remain<=0?{cls:"good",text:lang()==="en"?`<b>Debt Free:</b> Actual paid ${fmt(paid)}.`:`<b>Debt Free:</b> ยอดจ่ายจริง ${fmt(paid)} บาท`}:{cls:"warn",text:lang()==="en"?`<b>Actual Remaining:</b> ${fmt(remain)} left. Forecast planned payment is ${fmt(forecast)}.`:`<b>หนี้คงเหลือจริง:</b> ${fmt(remain)} บาท · ยอดตามแผน ${fmt(forecast)} บาท`});
a.push(riskPersonal?{cls:"bad",text:lang()==="en"?`<b>Budget Risk:</b> ${riskPersonal} month(s) negative.`:`<b>งบเสี่ยง:</b> มี ${riskPersonal} เดือนติดลบ`}:{cls:"good",text:lang()==="en"?`<b>Budget Healthy:</b> No negative Personal Use.`:`<b>งบดี:</b> ไม่มีเดือนที่เงินใช้ส่วนตัวติดลบ`});
a.push(low?{cls:"warn",text:lang()==="en"?`<b>Below Target:</b> ${low} month(s).`:`<b>ต่ำกว่า Target:</b> ${low} เดือน` }:{cls:"good",text:lang()==="en"?`<b>Payment Plan OK:</b> Plan is aligned with target.`:`<b>แผนจ่ายหนี้ OK:</b> สอดคล้องกับเป้าหมาย`});
if(noNew)a.push({cls:"bad",text:lang()==="en"?`<b>No New Debt:</b> ${noNew} month(s) not confirmed.`:`<b>No New Debt:</b> ยังไม่ยืนยัน ${noNew} เดือน`});
if(extra)a.push({cls:"good",text:lang()==="en"?`<b>Extra Paydown Plan:</b> ${extra} month(s).`:`<b>Extra Paydown Plan:</b> ${extra} เดือน`});
return a
}
function renderInsights(){document.getElementById("dashboardInsights").innerHTML=insights().slice(0,4).map(i=>`<div class="insight ${i.cls}">${i.text}</div>`).join("")}
function renderDashboardCards(){document.getElementById("dashboardMonthCards").innerHTML=data.months.slice(0,4).map((m,i)=>{const s=statusObj(m);return `<div class="month-card"><h4>Month ${m.month}</h4><div class="month-stat"><span>${t("debtPay")}</span><span>${fmt(m.debtPay)}</span></div><div class="month-stat"><span>${t("personalUse")}</span><span class="${personalUse(m)<0?'accent-pink':''}">${fmt(personalUse(m))}</span></div><div class="month-stat"><span>${t("debtLeft")}</span><span>${fmt(remainingDebtAfter(i))}</span></div><div class="month-stat"><span>${t("status")}</span><span><span class="badge ${s.cls}">${s.text}</span></span></div></div>`}).join("")}
function renderMonthSelector(){const sel=document.getElementById("selectedMonth");if(!sel)return;const cur=sel.value||"1";sel.innerHTML=data.months.map(m=>`<option value="${m.month}">Month ${m.month}</option>`).join("");sel.value=data.months.some(m=>String(m.month)===String(cur))?cur:(data.months[0]?.month||1)}
function renderMonthRows(){document.getElementById("monthRows").innerHTML=data.months.map((m,i)=>{const s=statusObj(m);return `<tr><td class="month-cell">Month ${m.month}</td><td class="num">${fmt(m.income)}</td><td class="num">${fmt(fixedCost(m))}</td><td class="num">${fmt(m.debtPay)}</td><td class="num">${fmt(m.saving)}</td><td class="num ${personalUse(m)<0?'accent-pink':''}">${fmt(personalUse(m))}</td><td class="num">${fmt(remainingDebtAfter(i))}</td><td><span class="badge ${s.cls}">${s.text}</span></td><td><button class="small" onclick="openEditModal(${i})"><svg class="svgicon"><use href="#ico-edit"/></svg>Edit</button> <button class="secondary small" onclick="goChecklist(${m.month})"><svg class="svgicon"><use href="#ico-check"/></svg>${t("checklist")}</button></td></tr>`}).join("")}
function renderChecklist(){const idx=selectedIndex(),m=data.months[idx];document.getElementById("checklistArea").innerHTML=checklistItems.map(item=>`<label class="check-card"><input type="checkbox" ${m.checklist[item.key]?"checked":""} onchange="updateChecklist(${idx},'${item.key}',this.checked)"><div><h4>${item[lang()][0]}</h4><p>${item[lang()][1]}</p></div></label>`).join("");const c=checklistCount(m),percent=c/5*100,s=statusObj(m);document.getElementById("viewAchievementBtn").style.display=c===5?"inline-flex":"none";document.getElementById("checkProgressLabel").textContent=`Month ${m.month}`;document.getElementById("checkProgressText").textContent=pct(percent);document.getElementById("checkProgressFill").style.width=`${percent}%`;document.getElementById("selectedSnapshot").innerHTML=`<div class="month-card"><h4>${t("personalUse")}</h4><div class="month-stat"><span>${t("personalUse")}</span><span class="${personalUse(m)<0?'accent-pink':''}">${fmt(personalUse(m))}</span></div><div class="month-stat"><span>${t("fixedCost")}</span><span>${fmt(fixedCost(m))}</span></div></div><div class="month-card"><h4>${t("checklist")}</h4><div class="month-stat"><span>${t("completed")}</span><span>${c}/5</span></div><div class="month-stat"><span>${t("status")}</span><span><span class="badge ${s.cls}">${s.text}</span></span></div></div>`}
function renderTimeline(){
document.getElementById("debtTimeline").innerHTML=data.months.map((m,i)=>{
const actual=paidUntil(i),planned=plannedPaidUntil(i),actualProg=data.startingDebt?Math.min(100,actual/data.startingDebt*100):0,plannedProg=data.startingDebt?Math.min(100,planned/data.startingDebt*100):0;
return `<div class="timeline-item"><div class="timeline-month">M${m.month}</div><div><div class="timeline-bar"><div class="timeline-fill" style="width:${actualProg}%"></div></div><div class="timeline-sub">${fmt(actual)} actual · ${fmt(planned)} forecast · ${fmt(remainingDebtAfter(i))} left</div></div><div class="timeline-value">${pct(actualProg)}</div></div>`

}
function renderProgressRows(){
const min=data.targetMonths?data.startingDebt/data.targetMonths:0;
document.getElementById("progressRows").innerHTML=data.months.map((m,i)=>{
const actual=paidUntil(i),planned=plannedPaidUntil(i),prog=data.startingDebt?Math.min(100,actual/data.startingDebt*100):0,remark=m.checklist?.debtPaid?"Paid":(m.debtPay<min?"Below Target Plan":"Planned"),cls=remark==="Paid"?"done":remark==="Below Target Plan"?"risk":"progress";
return `<tr><td class="month-cell">Month ${m.month}</td><td class="num">${fmt(m.debtPay)}</td><td class="num">${fmt(actual)}</td><td class="num">${fmt(planned)}</td><td class="num">${fmt(remainingDebtAfter(i))}</td><td class="num">${pct(prog)}</td><td><span class="badge ${cls}">${remark}</span></td></tr>`
}).join("")
}
function updateAppName(v){data.appName=String(v||"Money Mission Tracker").trim()||"Money Mission Tracker";renderLang();autoSave()}function updateOwnerName(v){data.ownerName=String(v||"Beam").trim()||"Beam";renderLang();autoSave()}function updateLanguage(v){data.languageMode=["th","en","mixed"].includes(v)?v:"mixed";render();autoSave()}function updateStartingDebt(v){data.startingDebt=Math.max(0,Number(v)||0);render();autoSave()}function updateTargetMonths(v){data.targetMonths=Math.max(1,Number(v)||1);render();autoSave()}
function updateChecklist(i,k,checked){data.months[i].checklist[k]=!!checked;const complete=checklistCount(data.months[i])===5;if(complete&&!data.months[i].achievementShown){data.months[i].achievementShown=true;render();autoSave();openAchievementModal(i);return}render();autoSave()}
function goChecklist(month){switchTab("checklist");setTimeout(()=>{document.getElementById("selectedMonth").value=month;renderChecklist()},0)}
function addMonth(){const last=data.months.at(-1);data.months.push({month:last?last.month+1:1,income:last?.income??33275,house:last?.house??4600,transport:last?.transport??2600,food:last?.food??8000,debtPay:8500,saving:last?.saving??4000,checklist:{debtPaid:false,savingDone:false,foodControlled:false,noNewDebt:false,balanceUpdated:false},achievementShown:false});data.targetMonths=Math.max(data.targetMonths,data.months.length);render();autoSave();toast("Added new month")}

function closeEditModal(){editingIndex=null;editModal.classList.remove("show")}function closeModalOnBackdrop(e){if(e.target.id==="editModal")closeEditModal()}
function openAchievementForSelected(){const i=selectedIndex();if(checklistCount(data.months[i])<5){toast("Complete checklist 5/5 first");return}openAchievementModal(i)}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function wrap(ctx,text,x,y,max,lineH){let words=String(text).split(" "),line="";for(let i=0;i<words.length;i++){let test=line+words[i]+" ";if(ctx.measureText(test).width>max&&i>0){ctx.fillText(line.trim(),x,y);line=words[i]+" ";y+=lineH}else line=test}ctx.fillText(line.trim(),x,y);return y}

),124,595,800,48);const metrics=[[t("paid"),fmt(m.debtPay)],[t("debtLeft"),fmt(left)],[t("saving"),fmt(m.saving)],["Checklist","5/5"]];const boxW=390,boxH=152,gap=26,startY=720;metrics.forEach((it,j)=>{const col=j%2,row=Math.floor(j/2),x=124+col*(boxW+gap),y=startY+row*(boxH+gap);roundRect(ctx,x,y,boxW,boxH,26);ctx.fillStyle="rgba(0,0,0,.20)";ctx.fill();ctx.strokeStyle="rgba(255,255,255,.14)";ctx.lineWidth=2;ctx.stroke();ctx.fillStyle="#cdbfe0";ctx.font="900 25px 'Noto Sans Thai', Arial";ctx.fillText(it[0].toUpperCase(),x+26,y+50);ctx.fillStyle="#fff8ff";ctx.font="900 48px 'Noto Sans Thai', Arial";ctx.fillText(it[1],x+26,y+112)});ctx.fillStyle="#fff0a8";ctx.font="900 30px 'Noto Sans Thai', Arial";ctx.fillText(t("achFooter"),124,1136);ctx.fillStyle="#cdbfe0";ctx.font="700 26px 'Noto Sans Thai', Arial";ctx.fillText(`${data.appName} · ${data.ownerName}`,124,1200);const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=`achievement-month-${m.month}.png`;a.click();toast("Achievement card downloaded")}
